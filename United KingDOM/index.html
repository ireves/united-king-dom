<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>United KingDOM — Break the Gag</title>
<link rel="stylesheet" href="shared.css" />
<style>
  html, body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #0A0A0A; }

  /* Tweaks panel */
  .tweaks { position: fixed; right: 16px; bottom: 16px; z-index: 200; width: 260px; background: #0A0A0A; color: #F4F1EA; border: 1.5px solid #0A0A0A; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; letter-spacing: 0.04em; display: none; }
  .tweaks.on { display: block; }
  .tweaks header { padding: 10px 14px; border-bottom: 1px solid rgba(244,241,234,0.25); display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; letter-spacing: 0.12em; }
  .tweaks header b { color: #E5261F; }
  .tweaks .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 14px; }
  .tweaks .group .label { text-transform: uppercase; letter-spacing: 0.12em; color: rgba(244,241,234,0.55); margin-bottom: 8px; font-size: 10px; }
  .tweaks .swatches { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweaks .sw { width: 26px; height: 26px; border: 1.5px solid rgba(244,241,234,0.25); cursor: pointer; padding: 0; }
  .tweaks .sw.on { border-color: #F4F1EA; }
  .tweaks .segs { display: flex; border: 1px solid rgba(244,241,234,0.25); }
  .tweaks .segs button { flex: 1; padding: 6px 4px; color: inherit; text-transform: uppercase; letter-spacing: 0.08em; font-size: 10px; border-right: 1px solid rgba(244,241,234,0.25); font-family: inherit; }
  .tweaks .segs button:last-child { border-right: none; }
  .tweaks .segs button.on { background: #E5261F; color: #0A0A0A; }
</style>
</head>
<body>

<template id="__bundler_thumbnail" data-bg-color="#0A0A0A">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0A0A0A"/>
    <text x="600" y="430" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="220" font-weight="900" fill="#F4F1EA" letter-spacing="-6">BREAK</text>
    <text x="600" y="620" text-anchor="middle" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-size="220" font-weight="900" fill="#E5261F" letter-spacing="-6">THE GAG</text>
  </svg>
</template>

<div id="root"></div>

<div class="tweaks" id="tweaks">
  <header><span>Tweaks</span><b>UKD</b></header>
  <div class="body">
    <div class="group">
      <div class="label">Accent color</div>
      <div class="swatches" id="sw-accent"></div>
    </div>
    <div class="group">
      <div class="label">Type width mix</div>
      <div class="segs" id="seg-type"></div>
    </div>
    <div class="group">
      <div class="label">Density</div>
      <div class="segs" id="seg-dens"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="content.jsx"></script>
<script type="text/babel" src="variation-a.jsx"></script>
<script type="text/babel" src="variation-b.jsx"></script>
<script type="text/babel" src="variation-c.jsx"></script>

<script type="text/babel">
// Defaults — tweakable
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#E5261F",
  "type": "extended",
  "density": "medium"
}/*EDITMODE-END*/;

const ACCENTS = [
  { id: 'red',     v: '#E5261F' },
  { id: 'oxblood', v: '#8B1A1A' },
  { id: 'black',   v: '#0A0A0A' },
  { id: 'electric',v: '#1F3FE5' },
  { id: 'lime',    v: '#C6E51F' },
];
const TYPES = [
  { id: 'compressed', label: 'Cmp', display: 'PPNC-Cmp', body: 'PPNC-Nor' },
  { id: 'condensed',  label: 'Con', display: 'PPNC-Con', body: 'PPNC-Nor' },
  { id: 'tight',      label: 'Tig', display: 'PPNC-Tig', body: 'PPNC-Nor' },
  { id: 'extended',   label: 'Ext', display: 'PPNC-Ext', body: 'PPNC-Nor' },
];
const DENS = [
  { id: 'tight',  label: 'Tight',  v: 0.82 },
  { id: 'medium', label: 'Medium', v: 1.0 },
  { id: 'airy',   label: 'Airy',   v: 1.18 },
];

function applyTweaks(t) {
  const root = document.documentElement;
  root.style.setProperty('--accent', t.accent);
  const ty = TYPES.find(x => x.id === t.type) || TYPES[3];
  root.style.setProperty('--display', `"${ty.display}"`);
  root.style.setProperty('--body', `"${ty.body}"`);
  const d = DENS.find(x => x.id === t.density) || DENS[1];
  root.style.setProperty('--density', d.v);
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [edit, setEdit] = React.useState(false);

  React.useEffect(() => { applyTweaks(tweaks); }, [tweaks]);

  // Edit-mode host protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEdit(true);
      if (d.type === '__deactivate_edit_mode') setEdit(false);
    };
    window.addEventListener('message', onMsg);
    // Announce after listener is live
    queueMicrotask(() => window.parent && window.parent.postMessage({ type: '__edit_mode_available' }, '*'));
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Wire the HTML tweak panel
  React.useEffect(() => {
    document.getElementById('tweaks').classList.toggle('on', edit);
  }, [edit]);

  React.useEffect(() => {
    const swWrap = document.getElementById('sw-accent');
    swWrap.innerHTML = '';
    ACCENTS.forEach(a => {
      const b = document.createElement('button');
      b.className = 'sw' + (a.v === tweaks.accent ? ' on' : '');
      b.style.background = a.v;
      b.title = a.id;
      b.onclick = () => setK({ accent: a.v });
      swWrap.appendChild(b);
    });

    const typeWrap = document.getElementById('seg-type');
    typeWrap.innerHTML = '';
    TYPES.forEach(t => {
      const b = document.createElement('button');
      b.className = t.id === tweaks.type ? 'on' : '';
      b.textContent = t.label;
      b.onclick = () => setK({ type: t.id });
      typeWrap.appendChild(b);
    });

    const dWrap = document.getElementById('seg-dens');
    dWrap.innerHTML = '';
    DENS.forEach(d => {
      const b = document.createElement('button');
      b.className = d.id === tweaks.density ? 'on' : '';
      b.textContent = d.label;
      b.onclick = () => setK({ density: d.id });
      dWrap.appendChild(b);
    });
  }, [tweaks, edit]);

  const setK = (patch) => {
    const next = { ...tweaks, ...patch };
    setTweaks(next);
    window.parent && window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  return (
    <VariationC />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
